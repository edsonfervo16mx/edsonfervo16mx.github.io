  <!-- ── Favicon ───────────────────────────────────────────────── -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="manifest.json">
  <meta name="msapplication-TileColor" content="#2563eb">
  <meta name="theme-color" content="#0f172a">

  <!-- ── Vue 3 ─────────────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

  <!-- ── Tailwind CSS ──────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- ── Font Awesome ──────────────────────────────────────────── -->
  <script src="https://kit.fontawesome.com/e31ceeedba.js" crossorigin="anonymous"></script>

  <!-- ── Google Fonts ──────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ── Base ──────────────────────────────────────────────────── */
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }

    /* ── Hero background ────────────────────────────────────────── */
    .hero-bg {
      background-color: #0f172a;
      background-image:
        radial-gradient(ellipse 80% 50% at 10% 40%, rgba(37,99,235,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 15%, rgba(6,182,212,0.12) 0%, transparent 60%);
    }

    /* ── SVG grid overlay ───────────────────────────────────────── */
    .grid-pattern {
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Gradient text ──────────────────────────────────────────── */
    .text-gradient {
      background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Scroll-reveal animations ───────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(36px);
      transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1),
                  transform 0.7s cubic-bezier(0.4,0,0.2,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-left  { opacity: 0; transform: translateX(-36px);
      transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1); }
    .reveal-left.visible  { opacity: 1; transform: translateX(0); }
    .reveal-right { opacity: 0; transform: translateX(36px);
      transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1); }
    .reveal-right.visible { opacity: 1; transform: translateX(0); }

    .delay-1 { transition-delay: 0.1s; }
    .delay-2 { transition-delay: 0.2s; }
    .delay-3 { transition-delay: 0.3s; }
    .delay-4 { transition-delay: 0.4s; }
    .delay-5 { transition-delay: 0.5s; }
    .delay-6 { transition-delay: 0.6s; }

    /* ── Hero fade-in ───────────────────────────────────────────── */
    @keyframes heroFade {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-animate      { animation: heroFade 0.8s ease both; }
    .hero-animate-d1   { animation: heroFade 0.8s 0.15s ease both; }
    .hero-animate-d2   { animation: heroFade 0.8s 0.3s ease both; }
    .hero-animate-d3   { animation: heroFade 0.8s 0.45s ease both; }
    .hero-animate-d4   { animation: heroFade 0.8s 0.6s ease both; }

    /* ── Floating glow orbs ─────────────────────────────────────── */
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.05); }
    }
    .orb { animation: float 8s ease-in-out infinite; border-radius: 50%; filter: blur(60px); }
    .orb-2 { animation-delay: -4s; }

    /* ── Card hover ─────────────────────────────────────────────── */
    .card {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.12);
    }

    /* ── Skill tag ──────────────────────────────────────────────── */
    .skill-tag { transition: transform 0.15s ease; }
    .skill-tag:hover { transform: scale(1.06); }

    /* ── Timeline ───────────────────────────────────────────────── */
    .timeline-line {
      position: absolute;
      left: 19px;
      top: 8px;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #3b82f6, #22d3ee 70%, transparent);
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    .nav-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

    /* ── Section divider ────────────────────────────────────────── */
    .divider-wave {
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      overflow: hidden; line-height: 0;
    }

    /* ── Project accent colors ──────────────────────────────────── */
    .accent-blue   { border-color: #3b82f6; }
    .accent-emerald{ border-color: #10b981; }
    .accent-rose   { border-color: #f43f5e; }
    .accent-indigo { border-color: #6366f1; }
    .accent-orange { border-color: #f97316; }
    .accent-cyan   { border-color: #06b6d4; }
    .icon-blue     { background: #eff6ff; color: #3b82f6; }
    .icon-emerald  { background: #ecfdf5; color: #10b981; }
    .icon-rose     { background: #fff1f2; color: #f43f5e; }
    .icon-indigo   { background: #eef2ff; color: #6366f1; }
    .icon-orange   { background: #fff7ed; color: #f97316; }
    .icon-cyan     { background: #ecfeff; color: #06b6d4; }
    .icon-amber    { background: #fffbeb; color: #f59e0b; }

    /* ── Award card colors ──────────────────────────────────────── */
    .award-amber  { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .award-cyan   { background: linear-gradient(135deg,#06b6d4,#0891b2); }
    .award-emerald{ background: linear-gradient(135deg,#10b981,#059669); }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }

    /* ── Mobile ─────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .skill-tag { font-size: 0.7rem; padding: 0.2rem 0.5rem; }
      .card:hover { transform: none; }
    }
  </style>
</head>

<body>
<div id="app">

  <!-- ── Loading ─────────────────────────────────────────────────── -->
  <div v-if="!loaded" class="min-h-screen flex items-center justify-center bg-slate-950">
    <div class="text-center">
      <i class="fas fa-circle-notch fa-spin text-blue-500 text-3xl mb-3 block"></i>
      <p class="text-slate-400 text-sm">Loading portfolio…</p>
    </div>
  </div>

  <template v-else>

    <!-- ── Scroll progress bar ─────────────────────────────────── -->
    <div class="fixed top-0 left-0 h-0.5 bg-gradient-to-r from-blue-500 to-cyan-400 z-[70] transition-all duration-100"
         :style="{ width: scrollProgress + '%' }"></div>

    <!-- ════════════════════════════════════════════════════════════
         NAVIGATION
    ═══════════════════════════════════════════════════════════════ -->
    <nav class="fixed top-0.5 left-0 right-0 z-50 transition-all duration-300"
         :class="scrolled
           ? 'bg-white/90 nav-blur shadow-sm border-b border-slate-100'
           : 'bg-transparent'">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="flex items-center justify-between h-16">

          <!-- Logo -->
          <a href="#home" class="flex items-center gap-2 font-extrabold text-lg"
             :class="scrolled ? 'text-slate-900' : 'text-white'">
            <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white text-sm">EV</span>
            <span class="hidden sm:inline">Edson Ventura</span>
          </a>

          <!-- Desktop links -->
          <div class="hidden md:flex items-center gap-1">
            <a v-for="link in navLinks" :key="link.id"
               :href="'#' + link.id"
               class="px-3 py-1.5 rounded-lg text-sm font-medium transition-all duration-200"
               :class="activeSection === link.id
                 ? (scrolled ? 'bg-blue-50 text-blue-600' : 'bg-white/15 text-white')
                 : (scrolled ? 'text-slate-600 hover:text-slate-900 hover:bg-slate-50' : 'text-white/70 hover:text-white hover:bg-white/10')">
              {{ link.label }}
            </a>
          </div>

          <!-- CTA + Mobile toggle -->
          <div class="flex items-center gap-3">
            <a href="#contact"
               class="hidden sm:inline-flex items-center gap-2 text-sm font-semibold px-4 py-2 rounded-lg transition-all"
               :class="scrolled
                 ? 'bg-blue-600 text-white hover:bg-blue-700'
                 : 'bg-white/15 text-white hover:bg-white/25 border border-white/20'">
              <i class="fas fa-paper-plane text-xs"></i> Hire me
            </a>
            <button @click="mobileOpen = !mobileOpen"
                    class="md:hidden w-9 h-9 flex flex-col items-center justify-center gap-1.5 rounded-lg transition-colors"
                    :class="scrolled ? 'hover:bg-slate-100' : 'hover:bg-white/10'">
              <span class="w-5 h-0.5 transition-all duration-300 rounded"
                    :class="[mobileOpen ? 'rotate-45 translate-y-2' : '', scrolled ? 'bg-slate-700' : 'bg-white']"></span>
              <span class="w-5 h-0.5 rounded transition-all duration-300"
                    :class="[mobileOpen ? 'opacity-0' : '', scrolled ? 'bg-slate-700' : 'bg-white']"></span>
              <span class="w-5 h-0.5 transition-all duration-300 rounded"
                    :class="[mobileOpen ? '-rotate-45 -translate-y-2' : '', scrolled ? 'bg-slate-700' : 'bg-white']"></span>
            </button>
          </div>
        </div>

        <!-- Mobile menu -->
        <div v-if="mobileOpen" class="md:hidden border-t py-3 flex flex-col gap-1"
             :class="scrolled ? 'border-slate-100' : 'border-white/10'">
          <a v-for="link in navLinks" :key="link.id"
             :href="'#' + link.id"
             @click="mobileOpen = false"
             class="px-3 py-2 rounded-lg text-sm font-medium transition-colors"
             :class="scrolled ? 'text-slate-700 hover:bg-slate-50' : 'text-white/80 hover:bg-white/10'">
            {{ link.label }}
          </a>
        </div>
      </div>
    </nav>

    <!-- ════════════════════════════════════════════════════════════
         HERO
    ═══════════════════════════════════════════════════════════════ -->
    <section id="home" class="relative min-h-screen flex flex-col hero-bg overflow-hidden">

      <!-- Background grid -->
      <div class="absolute inset-0 grid-pattern"></div>

      <!-- Glow orbs -->
      <div class="orb absolute top-[-120px] right-[-80px] w-[480px] h-[480px] opacity-25"
           style="background: radial-gradient(circle, #3b82f6 0%, transparent 70%);"></div>
      <div class="orb orb-2 absolute bottom-[-60px] left-[-60px] w-[320px] h-[320px] opacity-15"
           style="background: radial-gradient(circle, #06b6d4 0%, transparent 70%);"></div>

      <!-- SVG decorative lines -->
      <svg class="absolute right-0 top-0 h-full opacity-[0.04] pointer-events-none"
           viewBox="0 0 400 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <line x1="80"  y1="0" x2="400" y2="900" stroke="white" stroke-width="1"/>
        <line x1="160" y1="0" x2="480" y2="900" stroke="white" stroke-width="1"/>
        <line x1="240" y1="0" x2="560" y2="900" stroke="white" stroke-width="0.5"/>
        <circle cx="80"  cy="200" r="4" fill="white"/>
        <circle cx="200" cy="450" r="3" fill="white"/>
        <circle cx="320" cy="700" r="4" fill="white"/>
      </svg>

      <!-- Content -->
      <div class="relative z-10 flex-1 flex items-center">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 w-full py-32 lg:py-0">
          <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-16">

            <!-- Text side -->
            <div class="flex-1 text-center lg:text-left">
              <p class="hero-animate inline-flex items-center gap-2 text-blue-400 text-sm font-semibold tracking-widest uppercase mb-4">
                <span class="w-8 h-px bg-blue-400"></span>
                Available for new opportunities
              </p>
              <h1 class="hero-animate-d1 text-5xl sm:text-6xl lg:text-7xl font-black tracking-tight text-white leading-[1.05] mb-4">
                Hi, I'm<br>
                <span class="text-gradient">{{ profile.name }}</span>
              </h1>
              <h2 class="hero-animate-d2 text-xl sm:text-2xl font-semibold text-slate-300 mb-5">
                {{ profile.title }}
              </h2>
              <p class="hero-animate-d2 text-slate-400 text-base sm:text-lg leading-relaxed max-w-xl mx-auto lg:mx-0 mb-8">
                {{ profile.description }}
              </p>

              <!-- CTAs -->
              <div class="hero-animate-d3 flex flex-col sm:flex-row gap-3 justify-center lg:justify-start mb-8">
                <a v-for="cta in profile.cta" :key="cta.href" :href="cta.href"
                   :class="cta.variant === 'primary'
                     ? 'bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white shadow-lg shadow-blue-900/30'
                     : 'border border-white/20 text-white hover:bg-white/10'"
                   class="px-6 py-3 rounded-xl font-semibold text-sm transition-all text-center">
                  {{ cta.label }}
                </a>
              </div>

              <!-- Social icons -->
              <div class="hero-animate-d4 flex items-center gap-3 justify-center lg:justify-start">
                <span class="text-slate-500 text-xs font-medium uppercase tracking-wider">Find me on</span>
                <a v-for="link in contact" :key="link.platform"
                   :href="link.url" target="_blank"
                   class="w-9 h-9 rounded-lg bg-white/8 hover:bg-white/16 border border-white/10 flex items-center justify-center text-slate-300 hover:text-white transition-all hover:scale-110">
                  <i :class="link.icon" class="text-sm"></i>
                </a>
              </div>
            </div>

            <!-- Photo side -->
            <div class="hero-animate-d3 flex-shrink-0">
              <div class="relative">
                <!-- Glow ring -->
                <div class="absolute -inset-1.5 rounded-full bg-gradient-to-br from-blue-500 via-cyan-400 to-blue-600 opacity-60 blur-md"></div>
                <!-- Photo -->
                <img :src="profile.avatar" :alt="profile.name"
                  class="relative w-52 h-52 sm:w-60 sm:h-60 lg:w-72 lg:h-72 rounded-full border-4 border-slate-900 object-cover">
                <!-- Badge -->
                <div class="absolute -bottom-3 left-1/2 -translate-x-1/2 flex items-center gap-1.5 bg-emerald-500 text-white text-xs font-bold px-4 py-1.5 rounded-full whitespace-nowrap shadow-lg">
                  <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                  {{ profile.status }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Diagonal divider -->
      <div class="divider-wave">
        <svg viewBox="0 0 1440 64" xmlns="http://www.w3.org/2000/svg" class="w-full block" style="fill:#f8fafc">
          <path d="M0,64 L1440,0 L1440,64 Z"/>
        </svg>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         STATS STRIP
    ═══════════════════════════════════════════════════════════════ -->
    <section class="bg-slate-900 py-10">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 lg:gap-0 lg:divide-x lg:divide-slate-700">
          <div v-for="(stat, i) in profile.stats" :key="stat.label"
               class="reveal text-center lg:px-8"
               :class="'delay-' + (i + 1)">
            <div class="flex justify-center mb-2">
              <div class="w-10 h-10 rounded-xl bg-blue-600/20 flex items-center justify-center">
                <i :class="stat.icon" class="text-blue-400 text-sm"></i>
              </div>
            </div>
            <div class="text-3xl font-black text-white mb-1">{{ stat.value }}</div>
            <div class="text-slate-400 text-xs font-medium uppercase tracking-wider">{{ stat.label }}</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         AWARDS
    ═══════════════════════════════════════════════════════════════ -->
    <section id="awards" class="py-20 bg-slate-50">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">

        <div class="reveal text-center mb-14">
          <p class="text-blue-600 text-xs font-bold uppercase tracking-widest mb-2">Recognition</p>
          <h3 class="text-3xl lg:text-4xl font-extrabold text-slate-900">Awards & Honors</h3>
          <div class="mt-3 w-12 h-1 bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          <div v-for="(award, i) in awards" :key="award.description"
               class="reveal card bg-white rounded-2xl p-6 flex items-start gap-4 border border-slate-100 shadow-sm"
               :class="'delay-' + ((i % 3) + 1)">
            <div class="flex-shrink-0 w-12 h-12 rounded-xl flex items-center justify-center text-white"
                 :class="'award-' + award.color">
              <i :class="award.icon" class="text-lg"></i>
            </div>
            <div>
              <div class="font-bold text-slate-900 text-base">{{ award.title }}</div>
              <div class="text-slate-500 text-sm leading-snug mt-0.5">{{ award.description }}</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         EXPERIENCE
    ═══════════════════════════════════════════════════════════════ -->
    <section id="experience" class="py-20 bg-white">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">

        <div class="reveal text-center mb-14">
          <p class="text-blue-600 text-xs font-bold uppercase tracking-widest mb-2">Career</p>
          <h3 class="text-3xl lg:text-4xl font-extrabold text-slate-900">Professional Experience</h3>
          <div class="mt-3 w-12 h-1 bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto rounded-full"></div>
        </div>

        <!-- Timeline -->
        <div class="relative pl-10 sm:pl-12">
          <!-- Vertical line -->
          <div class="timeline-line"></div>

          <div v-for="(job, i) in experience" :key="job.company"
               class="relative mb-8 last:mb-0">

            <!-- Timeline dot -->
            <div class="absolute -left-10 sm:-left-12 top-5 w-6 h-6 rounded-full flex items-center justify-center z-10 border-2"
                 :class="job.variant === 'gradient'
                   ? 'bg-blue-600 border-blue-400'
                   : ['bg-white border-slate-300', 'icon-' + (job.theme || 'blue')]">
              <i :class="job.icon"
                 :class="job.variant === 'gradient' ? 'text-white' : 'text-' + (job.theme || 'blue') + '-500'"
                 class="text-[9px]"></i>
            </div>

            <!-- Card -->
            <div class="reveal card rounded-2xl overflow-hidden border shadow-sm"
                 :class="job.variant === 'gradient'
                   ? 'bg-gradient-to-r from-slate-900 to-blue-950 border-blue-900/50'
                   : 'bg-white border-slate-100'"
                 :style="'transition-delay: ' + (i * 0.07) + 's'">

              <!-- Gradient card content -->
              <template v-if="job.variant === 'gradient'">
                <div class="p-6">
                  <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-4">
                    <div>
                      <h4 class="text-lg font-bold text-white">{{ job.company }}</h4>
                      <p class="text-blue-300 text-sm font-medium">{{ job.role }}</p>
                    </div>
                    <span class="inline-flex items-center gap-1.5 bg-blue-500/20 text-blue-300 text-xs font-semibold px-3 py-1 rounded-full border border-blue-500/30 whitespace-nowrap self-start">
                      <span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
                      {{ job.period }}
                    </span>
                  </div>
                  <div class="flex flex-wrap gap-2">
                    <span v-for="skill in job.skills" :key="skill.label"
                          class="skill-tag flex items-center gap-1 bg-white/10 hover:bg-white/20 text-white border border-white/10 text-xs font-medium px-3 py-1 rounded-full">
                      <i :class="skill.icon" class="text-[10px]"></i>{{ skill.label }}
                    </span>
                  </div>
                </div>
              </template>

              <!-- White card content -->
              <template v-else>
                <div class="p-6">
                  <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-4">
                    <div class="flex items-start gap-3">
                      <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
                           :class="'icon-' + (job.theme || 'blue')">
                        <i :class="job.icon" class="text-base"></i>
                      </div>
                      <div>
                        <h4 class="text-base font-bold text-slate-900">{{ job.company }}</h4>
                        <p class="text-slate-500 text-sm">{{ job.role }}</p>
                      </div>
                    </div>
                    <span class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full self-start whitespace-nowrap">
                      {{ job.period }}
                    </span>
                  </div>
                  <div class="flex flex-wrap gap-1.5">
                    <span v-for="skill in job.skills" :key="skill.label"
                          :class="tagClass(skill.theme)"
                          class="skill-tag text-xs font-medium px-2.5 py-1 rounded-full">
                      <i :class="skill.icon" class="mr-1 text-[10px]"></i>{{ skill.label }}
                    </span>
                  </div>
                </div>
              </template>

            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         PROJECTS
    ═══════════════════════════════════════════════════════════════ -->
    <section id="projects" class="py-20 bg-slate-50">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">

        <div class="reveal text-center mb-14">
          <p class="text-blue-600 text-xs font-bold uppercase tracking-widest mb-2">Work</p>
          <h3 class="text-3xl lg:text-4xl font-extrabold text-slate-900">Featured Projects</h3>
          <div class="mt-3 w-12 h-1 bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          <div v-for="(project, i) in projects" :key="project.title"
               class="reveal card bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm flex flex-col"
               :class="'delay-' + ((i % 3) + 1)">

            <!-- Accent top bar -->
            <div class="h-1.5" :class="'accent-' + project.accent" style="border-top-width:0;border-bottom-width:0;background:currentColor;opacity:0.9;">
              <div class="h-full" :class="'bg-' + project.accent + '-500'"></div>
            </div>

            <div class="p-6 flex flex-col flex-1">
              <!-- Header -->
              <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 text-base"
                     :class="'icon-' + project.accent">
                  <i :class="project.icon"></i>
                </div>
                <h4 class="font-bold text-slate-900 text-base leading-tight">{{ project.title }}</h4>
              </div>

              <!-- Optional description -->
              <p v-if="project.description" class="text-slate-500 text-sm mb-3 leading-relaxed">
                {{ project.description }}
              </p>

              <!-- Items -->
              <ul class="space-y-1.5 mt-auto">
                <li v-for="item in project.items" :key="item"
                    class="flex items-center gap-2 text-slate-600 text-sm">
                  <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                        :class="'bg-' + project.accent + '-500'"></span>
                  {{ item }}
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         SKILLS
    ═══════════════════════════════════════════════════════════════ -->
    <section id="skills" class="py-20 bg-white">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">

        <div class="reveal text-center mb-14">
          <p class="text-blue-600 text-xs font-bold uppercase tracking-widest mb-2">Stack</p>
          <h3 class="text-3xl lg:text-4xl font-extrabold text-slate-900">Technical Skills</h3>
          <div class="mt-3 w-12 h-1 bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
          <div v-for="(group, i) in skills" :key="group.category"
               class="reveal card bg-slate-50 hover:bg-white rounded-2xl p-6 border border-slate-100"
               :class="'delay-' + ((i % 3) + 1)">
            <div class="flex items-center gap-2 mb-4">
              <i :class="[group.icon, group.iconColor]" class="text-lg"></i>
              <h4 class="font-bold text-slate-800 text-sm">{{ group.category }}</h4>
            </div>
            <div class="flex flex-wrap gap-1.5">
              <span v-for="item in group.items" :key="item.label"
                    :class="tagClass(item.theme)"
                    class="skill-tag text-xs font-medium px-2.5 py-1 rounded-full">
                {{ item.label }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         CONTACT
    ═══════════════════════════════════════════════════════════════ -->
    <section id="contact" class="py-20 bg-slate-900 relative overflow-hidden">

      <!-- Background decorations -->
      <div class="absolute inset-0 grid-pattern opacity-50"></div>
      <div class="absolute top-0 right-0 w-72 h-72 rounded-full opacity-10"
           style="background: radial-gradient(circle, #3b82f6, transparent 70%); transform: translate(30%, -30%);"></div>

      <div class="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 text-center">
        <div class="reveal mb-12">
          <p class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-3">Let's work together</p>
          <h3 class="text-3xl lg:text-4xl font-extrabold text-white mb-4">Get In Touch</h3>
          <div class="w-12 h-1 bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto rounded-full mb-5"></div>
          <p class="text-slate-400 text-base max-w-lg mx-auto leading-relaxed">
            I'm always open to new opportunities, exciting projects, and interesting conversations.
            Don't hesitate to reach out.
          </p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <a v-for="(link, i) in contact" :key="link.platform"
             :href="link.url" target="_blank"
             class="reveal card group flex flex-col items-center gap-3 p-6 rounded-2xl border border-white/8 transition-all"
             :class="[link.bg, 'delay-' + (i + 1)]">
            <div class="w-12 h-12 rounded-xl bg-white/10 group-hover:bg-white/20 flex items-center justify-center transition-colors">
              <i :class="link.icon" class="text-white text-xl"></i>
            </div>
            <div>
              <div class="font-bold text-white text-sm">{{ link.platform }}</div>
              <div :class="link.text" class="text-xs mt-0.5">{{ link.handle }}</div>
            </div>
          </a>
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════════════════════════════ -->
    <footer class="bg-slate-950 py-8 border-t border-slate-800">
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <span class="w-7 h-7 rounded-md bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white text-xs font-bold">EV</span>
            <p class="text-slate-500 text-sm">
              © {{ currentYear }} Edson Fernando Ventura Oropeza
            </p>
          </div>
          <div class="flex items-center gap-1">
            <a v-for="link in contact" :key="link.platform"
               :href="link.url" target="_blank"
               class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-500 hover:text-white hover:bg-slate-800 transition-all text-sm">
              <i :class="link.icon"></i>
            </a>
          </div>
        </div>
      </div>
    </footer>

  </template>
</div>

<script>
  const { createApp, ref, onMounted, onUnmounted, nextTick } = Vue;

  createApp({
    setup() {
      // ── State ──────────────────────────────────────────────────
      const loaded        = ref(false);
      const scrolled      = ref(false);
      const scrollProgress= ref(0);
      const activeSection = ref('home');
      const mobileOpen    = ref(false);
      const profile       = ref(null);
      const awards        = ref([]);
      const experience    = ref([]);
      const projects      = ref([]);
      const skills        = ref([]);
      const contact       = ref([]);
      const currentYear   = new Date().getFullYear();

      const navLinks = [
        { id: 'awards',     label: 'Awards' },
        { id: 'experience', label: 'Experience' },
        { id: 'projects',   label: 'Projects' },
        { id: 'skills',     label: 'Skills' },
        { id: 'contact',    label: 'Contact' },
      ];

      // ── Color theme map ────────────────────────────────────────
      const TAG = {
        blue:   'bg-blue-50 text-blue-700',
        green:  'bg-emerald-50 text-emerald-700',
        cyan:   'bg-cyan-50 text-cyan-700',
        yellow: 'bg-amber-50 text-amber-700',
        orange: 'bg-orange-50 text-orange-700',
        red:    'bg-rose-50 text-rose-700',
        teal:   'bg-teal-50 text-teal-700',
        indigo: 'bg-indigo-50 text-indigo-700',
      };

      function tagClass(theme) {
        return TAG[theme] || TAG.blue;
      }

      // ── Scroll handler ─────────────────────────────────────────
      function onScroll() {
        const y = window.scrollY;
        scrolled.value = y > 60;
        const docH = document.body.scrollHeight - window.innerHeight;
        scrollProgress.value = docH > 0 ? (y / docH) * 100 : 0;

        const sectionIds = ['home', 'awards', 'experience', 'projects', 'skills', 'contact'];
        for (let i = sectionIds.length - 1; i >= 0; i--) {
          const el = document.getElementById(sectionIds[i]);
          if (el && el.getBoundingClientRect().top <= 100) {
            activeSection.value = sectionIds[i];
            break;
          }
        }
      }

      // ── Reveal on scroll ──────────────────────────────────────
      function initReveal() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

        document.querySelectorAll('.reveal, .reveal-left, .reveal-right')
          .forEach(el => observer.observe(el));
      }

      // ── Lifecycle ─────────────────────────────────────────────
      onMounted(async () => {
        window.addEventListener('scroll', onScroll, { passive: true });
        try {
          const data  = await fetch('data.json').then(r => r.json());
          profile.value    = data.profile;
          awards.value     = data.awards;
          experience.value = data.experience;
          projects.value   = data.projects;
          skills.value     = data.skills;
          contact.value    = data.contact;
          loaded.value     = true;
          await nextTick();
          initReveal();
        } catch (err) {
          console.error('Failed to load portfolio data:', err);
        }
      });

      onUnmounted(() => {
        window.removeEventListener('scroll', onScroll);
      });

      return {
        loaded, scrolled, scrollProgress, activeSection, mobileOpen,
        profile, awards, experience, projects, skills, contact,
        currentYear, navLinks, tagClass,
      };
    }
  }).mount('#app');
</script>

</body>
</html>

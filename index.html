<!DOCTYPE html>
<html lang="en">

<head>
  <title>Edson Ventura - Software Engineer | Full Stack Developer</title>
  <meta charset="utf-8">

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script src="https://kit.fontawesome.com/e31ceeedba.js" crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    .skill-tag {
      transition: all 0.2s ease;
    }

    .skill-tag:hover {
      transform: scale(1.05);
    }

    .animate-fade-in {
      animation: fadeIn 0.6s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .container { padding-left: 1rem; padding-right: 1rem; }
      .skill-tag { font-size: 0.75rem; padding: 0.25rem 0.5rem; }
      .card-hover:hover { transform: none; }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .container { padding-left: 1.5rem; padding-right: 1.5rem; }
    }

    @media (max-width: 480px) {
      .py-12 { padding-top: 2rem;  padding-bottom: 2rem; }
      .py-16 { padding-top: 3rem;  padding-bottom: 3rem; }
      .mb-8  { margin-bottom: 1.5rem; }
      .mb-12 { margin-bottom: 2rem; }
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900">
  <div id="app">

    <!-- Loading state -->
    <div v-if="!loaded" class="min-h-screen flex items-center justify-center bg-gray-50">
      <i class="fas fa-circle-notch fa-spin text-blue-600 text-4xl"></i>
    </div>

    <template v-else>

      <!-- ── Header ─────────────────────────────────────────────── -->
      <header class="gradient-bg text-white py-12 lg:py-20">
        <div class="container mx-auto px-4 max-w-6xl">
          <div class="flex flex-col lg:flex-row items-center justify-between">

            <div class="w-full lg:w-2/3 mb-8 lg:mb-0 text-center lg:text-left">
              <h1 class="text-3xl sm:text-4xl lg:text-6xl font-bold mb-4 animate-fade-in">
                {{ profile.name }}
              </h1>
              <h2 class="text-xl sm:text-2xl lg:text-3xl font-semibold mb-4 lg:mb-6 text-blue-100">
                {{ profile.title }}
              </h2>
              <p class="text-base sm:text-lg lg:text-xl text-blue-50 mb-6 lg:mb-8 leading-relaxed">
                {{ profile.description }}
              </p>
              <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center lg:justify-start">
                <a v-for="cta in profile.cta" :key="cta.href"
                   :href="cta.href"
                   :class="cta.variant === 'primary'
                     ? 'bg-white text-blue-600 hover:bg-blue-50'
                     : 'border-2 border-white text-white hover:bg-white hover:text-blue-600'"
                   class="px-6 py-3 rounded-lg font-semibold transition-colors text-center">
                  {{ cta.label }}
                </a>
              </div>
            </div>

            <div class="w-full lg:w-1/3 flex justify-center">
              <div class="relative">
                <img :src="profile.avatar" :alt="profile.name"
                  class="w-48 h-48 sm:w-56 sm:h-56 lg:w-64 lg:h-64 rounded-full border-4 border-white shadow-2xl">
                <div class="absolute -bottom-4 -right-4 bg-green-500 text-white px-3 py-1 rounded-full text-sm font-semibold">
                  {{ profile.status }}
                </div>
              </div>
            </div>

          </div>
        </div>
      </header>

      <!-- ── Awards ─────────────────────────────────────────────── -->
      <section class="py-12 bg-white">
        <div class="container mx-auto px-4 max-w-6xl">
          <div class="text-center mb-12">
            <h3 class="text-2xl font-bold text-gray-800 mb-4">Awards & Recognition</h3>
            <div class="w-24 h-1 bg-blue-600 mx-auto"></div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 lg:gap-6">
            <div v-for="award in awards" :key="award.description"
                 :class="'bg-gradient-to-r ' + award.gradient"
                 class="text-white p-4 lg:p-6 rounded-xl text-center card-hover">
              <i :class="award.icon" class="text-2xl lg:text-3xl mb-3 lg:mb-4"></i>
              <h4 class="font-bold text-base lg:text-lg mb-2">{{ award.title }}</h4>
              <p class="text-xs lg:text-sm">{{ award.description }}</p>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Experience ─────────────────────────────────────────── -->
      <section class="py-16 bg-gray-50">
        <div class="container mx-auto px-4 max-w-6xl">
          <div class="text-center mb-12">
            <h3 class="text-3xl font-bold text-gray-800 mb-4">Professional Experience</h3>
            <div class="w-24 h-1 bg-blue-600 mx-auto"></div>
          </div>
          <div class="space-y-6 lg:space-y-8">
            <template v-for="job in experience" :key="job.company">

              <!-- Gradient variant (Halsei, GigNet) -->
              <div v-if="job.variant === 'gradient'"
                   class="bg-gradient-to-r from-blue-500 to-blue-600 p-6 rounded-xl shadow-lg card-hover">
                <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between mb-4">
                  <div class="flex items-start space-x-4 mb-4 lg:mb-0">
                    <div class="bg-white/20 p-3 rounded-lg flex-shrink-0">
                      <i :class="job.icon" class="text-white text-xl"></i>
                    </div>
                    <div>
                      <h4 class="text-xl font-bold text-white">{{ job.company }}</h4>
                      <p class="text-white/90">{{ job.role }}</p>
                    </div>
                  </div>
                  <span class="bg-white/20 text-white px-3 py-1 rounded-full text-sm font-medium self-start">
                    {{ job.period }}
                  </span>
                </div>
                <div class="flex flex-wrap gap-2">
                  <span v-for="skill in job.skills" :key="skill.label"
                        class="skill-tag bg-white/20 text-white px-3 py-1 rounded-full text-sm font-medium">
                    <i :class="skill.icon" class="mr-1"></i>{{ skill.label }}
                  </span>
                </div>
              </div>

              <!-- Card variant (remaining jobs) -->
              <div v-else class="bg-white p-6 rounded-xl shadow-lg card-hover">
                <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between mb-4">
                  <div class="flex items-start space-x-4 mb-4 lg:mb-0">
                    <div :class="color(job.theme).bg" class="p-3 rounded-lg flex-shrink-0">
                      <i :class="[job.icon, color(job.theme).icon]" class="text-xl"></i>
                    </div>
                    <div>
                      <h4 class="text-xl font-bold text-gray-800">{{ job.company }}</h4>
                      <p class="text-gray-600">{{ job.role }}</p>
                    </div>
                  </div>
                  <span :class="[color(job.theme).bg, color(job.theme).text]"
                        class="px-3 py-1 rounded-full text-sm font-medium self-start">
                    {{ job.period }}
                  </span>
                </div>
                <div class="flex flex-wrap gap-2">
                  <span v-for="skill in job.skills" :key="skill.label"
                        :class="[color(skill.theme).bg, color(skill.theme).text]"
                        class="skill-tag px-3 py-1 rounded-full text-sm font-medium">
                    <i :class="skill.icon" class="mr-1"></i>{{ skill.label }}
                  </span>
                </div>
              </div>

            </template>
          </div>
        </div>
      </section>

      <!-- ── Projects ───────────────────────────────────────────── -->
      <section id="projects" class="py-16 bg-white">
        <div class="container mx-auto px-4 max-w-6xl">
          <div class="text-center mb-12">
            <h3 class="text-3xl font-bold text-gray-800 mb-4">Featured Projects</h3>
            <div class="w-24 h-1 bg-blue-600 mx-auto"></div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
            <div v-for="project in projects" :key="project.title"
                 :class="'bg-gradient-to-br ' + project.gradient"
                 class="text-white p-4 lg:p-6 rounded-xl card-hover">
              <div class="flex items-center mb-3 lg:mb-4">
                <i :class="project.icon" class="text-xl lg:text-2xl mr-3"></i>
                <h4 class="text-base lg:text-lg font-bold">{{ project.title }}</h4>
              </div>
              <p v-if="project.description" class="text-xs lg:text-sm mb-3">{{ project.description }}</p>
              <ul class="space-y-1 lg:space-y-2 text-xs lg:text-sm">
                <li v-for="item in project.items" :key="item">• {{ item }}</li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Skills ─────────────────────────────────────────────── -->
      <section class="py-16 bg-gray-50">
        <div class="container mx-auto px-4 max-w-6xl">
          <div class="text-center mb-12">
            <h3 class="text-3xl font-bold text-gray-800 mb-4">Technical Skills</h3>
            <div class="w-24 h-1 bg-blue-600 mx-auto"></div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
            <div v-for="group in skills" :key="group.category"
                 class="bg-white p-4 lg:p-6 rounded-xl shadow-lg">
              <h4 class="text-lg lg:text-xl font-bold text-gray-800 mb-3 lg:mb-4 flex items-center">
                <i :class="[group.icon, group.iconColor]" class="mr-3"></i>{{ group.category }}
              </h4>
              <div class="flex flex-wrap gap-2">
                <span v-for="item in group.items" :key="item.label"
                      :class="[color(item.theme).bg, color(item.theme).text]"
                      class="skill-tag px-2 lg:px-3 py-1 rounded-full text-xs lg:text-sm font-medium">
                  {{ item.label }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Contact ────────────────────────────────────────────── -->
      <section id="contact" class="py-16 bg-white">
        <div class="container mx-auto px-4 max-w-4xl">
          <div class="text-center mb-12">
            <h3 class="text-3xl font-bold text-gray-800 mb-4">Get In Touch</h3>
            <div class="w-24 h-1 bg-blue-600 mx-auto"></div>
            <p class="text-gray-600 mt-4">I'm always interested in new opportunities and exciting projects.</p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
            <a v-for="link in contact" :key="link.platform"
               :href="link.url" target="_blank"
               :class="[link.cardClass, link.spanClass || '']"
               class="text-white p-4 lg:p-6 rounded-xl text-center card-hover group">
              <i :class="link.icon"
                 class="text-2xl lg:text-3xl mb-3 lg:mb-4 group-hover:scale-110 transition-transform"></i>
              <h4 class="font-bold text-base lg:text-lg mb-2">{{ link.platform }}</h4>
              <p :class="link.textClass" class="text-sm lg:text-base">{{ link.handle }}</p>
            </a>
          </div>
        </div>
      </section>

      <!-- ── Footer ─────────────────────────────────────────────── -->
      <footer class="bg-gray-900 text-white py-8">
        <div class="container mx-auto px-4 max-w-6xl">
          <div class="flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
              <p class="text-gray-300">
                © {{ currentYear }} Edson Fernando Ventura Oropeza. All rights reserved.
              </p>
            </div>
            <div class="flex space-x-6">
              <a v-for="link in contact" :key="link.platform"
                 :href="link.url" target="_blank"
                 class="text-gray-300 hover:text-white transition-colors">
                <i :class="link.icon" class="text-xl"></i>
              </a>
            </div>
          </div>
        </div>
      </footer>

    </template>
  </div>

  <script>
    const { createApp, ref, onMounted, nextTick } = Vue;

    createApp({
      setup() {
        const loaded = ref(false);
        const profile = ref(null);
        const awards = ref([]);
        const experience = ref([]);
        const projects = ref([]);
        const skills = ref([]);
        const contact = ref([]);
        const currentYear = new Date().getFullYear();

        const COLOR = {
          blue:   { bg: 'bg-blue-100',   text: 'text-blue-800',   icon: 'text-blue-600' },
          green:  { bg: 'bg-green-100',  text: 'text-green-800',  icon: 'text-green-600' },
          yellow: { bg: 'bg-yellow-100', text: 'text-yellow-800', icon: 'text-yellow-600' },
          orange: { bg: 'bg-orange-100', text: 'text-orange-800', icon: 'text-orange-600' },
          red:    { bg: 'bg-red-100',    text: 'text-red-800',    icon: 'text-red-600' },
          purple: { bg: 'bg-purple-100', text: 'text-purple-800', icon: 'text-purple-600' },
          teal:   { bg: 'bg-teal-100',   text: 'text-teal-800',   icon: 'text-teal-600' },
          indigo: { bg: 'bg-indigo-100', text: 'text-indigo-800', icon: 'text-indigo-600' },
        };

        function color(theme) {
          return COLOR[theme] || COLOR.blue;
        }

        function initObserver() {
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) entry.target.classList.add('animate-fade-in');
            });
          }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

          document.querySelectorAll('.card-hover, section').forEach(el => observer.observe(el));
        }

        onMounted(async () => {
          try {
            const data = await fetch('data.json').then(r => r.json());
            profile.value   = data.profile;
            awards.value    = data.awards;
            experience.value = data.experience;
            projects.value  = data.projects;
            skills.value    = data.skills;
            contact.value   = data.contact;
            loaded.value    = true;
            await nextTick();
            initObserver();
          } catch (err) {
            console.error('Failed to load portfolio data:', err);
          }
        });

        return { loaded, profile, awards, experience, projects, skills, contact, currentYear, color };
      }
    }).mount('#app');
  </script>

</body>
</html>
